spring.application.name=doori-backend
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

spring.datasource.url=jdbc:h2:mem:doori;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

spring.mail.host=localhost
spring.mail.port=25

jwt.secret=doori-backend-secret-key-for-test-only-must-be-32chars
jwt.access-token-valid-ms=3600000
jwt.refresh-token-valid-ms=2592000000
